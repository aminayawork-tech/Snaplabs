services:
  - type: web
    name: snappymarketer-api
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://snappymarketer.vercel.app,http://localhost:3000"
    disk:
      name: snaplabs-db
      mountPath: /opt/render/project/src
      sizeGB: 1
